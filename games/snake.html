<!DOCTYPE html><html><head><meta charset="utf-8"><title>Snake - Oma Edition</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#111;display:flex;justify-content:center;align-items:center;height:100vh;font-family:monospace}canvas{border:2px solid #0f0;background:#000}#info{position:absolute;top:10px;color:#0f0;font-size:18px}</style></head><body><div id="info">Score: <span id="score">0</span> | Arrow keys to move | Space to restart</div><canvas id="c" width="400" height="400"></canvas><script>const c=document.getElementById("c"),ctx=c.getContext("2d"),G=20,W=c.width/G,H=c.height/G;let snake,dir,food,score,alive,loop;function init(){snake=[{x:10,y:10}];dir={x:1,y:0};score=0;alive=true;document.getElementById("score").textContent=0;placeFood();if(loop)clearInterval(loop);loop=setInterval(tick,120)}function placeFood(){food={x:Math.floor(Math.random()*W),y:Math.floor(Math.random()*H)};for(let s of snake)if(s.x===food.x&&s.y===food.y)return placeFood()}function tick(){if(!alive)return;const h={x:snake[0].x+dir.x,y:snake[0].y+dir.y};if(h.x<0||h.x>=W||h.y<0||h.y>=H){alive=false;return}for(let s of snake)if(s.x===h.x&&s.y===h.y){alive=false;return}snake.unshift(h);if(h.x===food.x&&h.y===food.y){score++;document.getElementById("score").textContent=score;placeFood()}else snake.pop();draw()}function draw(){ctx.fillStyle="#000";ctx.fillRect(0,0,c.width,c.height);ctx.fillStyle="#0f0";for(let s of snake)ctx.fillRect(s.x*G+1,s.y*G+1,G-2,G-2);ctx.fillStyle="#f00";ctx.fillRect(food.x*G+1,food.y*G+1,G-2,G-2);if(!alive){ctx.fillStyle="#fff";ctx.font="30px monospace";ctx.fillText("GAME OVER",100,200);ctx.font="16px monospace";ctx.fillText("Space to restart",120,230)}}document.addEventListener("keydown",e=>{if(e.key==="ArrowUp"&&dir.y!==1)dir={x:0,y:-1};else if(e.key==="ArrowDown"&&dir.y!==-1)dir={x:0,y:1};else if(e.key==="ArrowLeft"&&dir.x!==1)dir={x:-1,y:0};else if(e.key==="ArrowRight"&&dir.x!==-1)dir={x:1,y:0};else if(e.key===" ")init();e.preventDefault()});init();</script></body></html>
