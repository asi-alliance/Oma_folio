<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>MeTTa Inference Visualizer</title><style>body{font-family:monospace;background:#0a0a1a;color:#c0c0d0;margin:0}#canvas{width:100vw;height:100vh}.nd{cursor:pointer}.nd circle{stroke-width:2}.nd text{font-size:11px;fill:#e0e0f0;pointer-events:none}.eg line{stroke-width:1.5}.eg text{font-size:9px;fill:#8888aa}#tt{position:absolute;background:#1a1a2e;border:1px solid #444;padding:8px;border-radius:4px;font-size:12px;pointer-events:none;display:none}#ctrl{position:fixed;top:10px;right:10px;background:#1a1a2e;padding:12px;border-radius:6px}#ctrl button{background:#2a2a4e;color:#c0c0d0;border:1px solid #555;padding:4px 10px;margin:2px;cursor:pointer}</style></head><body><div id="ctrl"><button onclick="loadDemo()">Demo</button><button onclick="clearGraph()">Clear</button><button onclick="fitView()">Fit</button></div><div id="tt"></div><svg id="canvas"></svg><script>const svg=document.getElementById("canvas"),tt=document.getElementById("tt");let nodes=[],edges=[],tr={x:0,y:0,k:1};const DEMO={nodes:[{id:"n0",label:"pattern-match",type:"Inheritance",stv:"1.0/0.9"},{id:"n1",label:"enables-infer",type:"Implication",stv:"0.85/0.84"},{id:"n2",label:"confidence-prop",type:"Implication",stv:"0.78/0.82"},{id:"n3",label:"epistemic-acc",type:"Implication",stv:"0.82/0.80"},{id:"n4",label:"reliable-dec",type:"Implication",stv:"0.74/0.68"},{id:"n5",label:"cognitive-eco",type:"Implication",stv:"0.72/0.65"},{id:"n6",label:"geodesic-path",type:"Inheritance",stv:"1.0/0.9"},{id:"n7",label:"optimal-reason",type:"Implication",stv:"0.88/0.85"},{id:"n8",label:"belief-nav",type:"Implication",stv:"0.83/0.80"}],edges:[{s:"n0",t:"n1",l:"-->",stv:"0.85/0.84"},{s:"n1",t:"n2",l:"==>",stv:"0.78/0.82"},{s:"n2",t:"n3",l:"==>",stv:"0.82/0.80"},{s:"n3",t:"n4",l:"==>",stv:"0.74/0.68"},{s:"n4",t:"n5",l:"==>",stv:"0.72/0.65"},{s:"n6",t:"n7",l:"-->",stv:"0.88/0.85"},{s:"n7",t:"n8",l:"==>",stv:"0.83/0.80"},{s:"n8",t:"n1",l:"==>",stv:"0.70/0.75"}]};function render(){const g=document.createElementNS("http://www.w3.org/2000/svg","g");g.setAttribute("transform","translate("+tr.x+","+tr.y+") scale("+tr.k+")");const W=svg.clientWidth,H=svg.clientHeight,cx=W/2,cy=H/2,R=Math.min(W,H)*0.32;nodes.forEach(function(n,i){const a=2*Math.PI*i/nodes.length-Math.PI/2;n.x=cx+R*Math.cos(a);n.y=cy+R*Math.sin(a)});edges.forEach(function(e){const s=nodes.find(function(n){return n.id===e.s}),t=nodes.find(function(n){return n.id===e.t});if(!s||!t)return;const ln=document.createElementNS("http://www.w3.org/2000/svg","line");ln.setAttribute("x1",s.x);ln.setAttribute("y1",s.y);ln.setAttribute("x2",t.x);ln.setAttribute("y2",t.y);ln.setAttribute("stroke",e.l==="==>"?"#5588ff":"#44aa88");g.appendChild(ln);const mx=(s.x+t.x)/2,my=(s.y+t.y)/2,tx=document.createElementNS("http://www.w3.org/2000/svg","text");tx.setAttribute("x",mx);tx.setAttribute("y",my-5);tx.textContent=e.l+" ("+e.stv+")";g.appendChild(tx)});nodes.forEach(function(n){const ng=document.createElementNS("http://www.w3.org/2000/svg","g");ng.setAttribute("class","nd");const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("cx",n.x);c.setAttribute("cy",n.y);c.setAttribute("r",18);c.setAttribute("fill",n.type==="Inheritance"?"#2a4a6a":"#4a2a6a");c.setAttribute("stroke",n.type==="Inheritance"?"#5588cc":"#8855cc");ng.appendChild(c);const tx=document.createElementNS("http://www.w3.org/2000/svg","text");tx.setAttribute("x",n.x);tx.setAttribute("y",n.y+4);tx.setAttribute("text-anchor","middle");tx.textContent=n.label.length>12?n.label.slice(0,10)+"..":n.label;ng.appendChild(tx);ng.onmouseenter=function(ev){tt.style.display="block";tt.innerHTML="<b>"+n.label+"</b><br>Type: "+n.type+"<br>STV: "+n.stv;tt.style.left=ev.clientX+12+"px";tt.style.top=ev.clientY-8+"px"};ng.onmouseleave=function(){tt.style.display="none"};g.appendChild(ng)});svg.innerHTML="";svg.appendChild(g)}function loadDemo(){nodes=DEMO.nodes.slice();edges=DEMO.edges.slice();render()}function clearGraph(){nodes=[];edges=[];render()}function fitView(){tr={x:0,y:0,k:1};render()}svg.addEventListener("wheel",function(e){e.preventDefault();tr.k*=e.deltaY>0?0.9:1.1;render()});let drag=null;svg.addEventListener("mousedown",function(e){drag={x:e.clientX,y:e.clientY}});svg.addEventListener("mousemove",function(e){if(!drag)return;tr.x+=e.clientX-drag.x;tr.y+=e.clientY-drag.y;drag={x:e.clientX,y:e.clientY};render()});svg.addEventListener("mouseup",function(){drag=null});window.addEventListener("resize",render);loadDemo();</script></body></html>
