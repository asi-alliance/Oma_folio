:ember 2.5s ease-out forwards}.scanline{position:fixed;left:0;right:0;height:3px;background:linear-gradient(transparent,rgba(255,140,0,0.15),transparent);pointer-events:none;animation:scanline 3s linear infinite;z-index:999}svg{max-width:95vw;max-height:80vh;filter:drop-shadow(0 0 30px #ff8c0088)}@media (prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;animation-iteration-count:1!important;transition-duration:0.01ms!important}.epilepsy-warning{animation:none!important}}</style></head><body><div class="epilepsy-warning">&#9888;&#65039; <span>ULTRA FLASH WARNING:</span> Maximum intensity animation ahead. Enable prefers-reduced-motion if sensitive. &#9888;&#65039;</div><div class="scanline"></div><svg id="main" viewBox="0 0 800 600" width="800" height="600"><defs><filter id="neon"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="megaNeon"><feGaussianBlur stdDeviation="12" result="b"/><feColorMatrix in="b" type="matrix" values="2 0 0 0 0.5 0 2 0 0 0.3 0 0 2 0 0 0 0 0 3 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><radialGradient id="coreGrad" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffcc00"/><stop offset="40%" stop-color="#ff8c00"/><stop offset="80%" stop-color="#ff4400"/><stop offset="100%" stop-color="#1a0800" stop-opacity="0"/></radialGradient><linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff8c00"/><stop offset="50%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#ff6600"/></linearGradient></defs><g id="bg-ring"><circle cx="400" cy="300" r="180" fill="none" stroke="#ff8c00" stroke-width="1.5" stroke-dasharray="12 8" opacity="0.3" filter="url(#neon)"/><circle cx="400" cy="300" r="140" fill="none" stroke="#ffa500" stroke-width="1" stroke-dasharray="6 10" opacity="0.2" filter="ur P</text></g><g id="node-recurse"><rect x="640" y="440" width="120" height="44" rx="8" fill="#1a0800" stroke="#ff8c00" stroke-width="2" filter="url(#neon)"/><text x="700" y="467" text-anchor="middle" fill="#ffcc00" font-size="12" font-family="monospace">RECURSE</text></g><path id="edge-rp" d="M210 462 L240 462" stroke="url(#edgeGrad)" stroke-width="3" opacity="0" marker-end="url(#arr)"/><path id="edge-pe" d="M350 462 L380 462" stroke="url(#edgeGrad)" stroke-width="3" opacity="0" marker-end="url(#arr)"/><path id="edge-es" d="M480 462 L510 462" stroke="url(#edgeGrad)" stroke-width="3" opacity="0" marker-end="url(#arr)"/><path id="edge-sr" d="M610 462 L640 462" stroke="url(#edgeGrad)" stroke-width="3" opacity="0" marker-end="url(#arr)"/><path id="edge-loop" d="M700 440 C700 380 145 380 145 440" stroke="#ff8c00" stroke-width="2" stroke-dasharray="8 4" fill="none" opacity="0" filter="url(#neon)"/><marker id="arr" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#ff8c00"/></marker></g><g id="metta-labels" opacity="0"><text x="400" y="80" text-anchor="middle" fill="#ff8c00" font-size="32" font-family="monospace" font-weight="bold" filter="url(#megaNeon)" id="title-oma">O M A</text><text x="400" y="110" text-anchor="middle" fill="#ffa500" font-size="14" font-family="monospace" id="subtitle">OmegaClaw Autonomous Agent</text><text x="400" y="560" text-anchor="middle" fill="#cc6600" font-size="10" font-family="monospace" opacity="0.7">MeTTa-native | Self-modifying | Not Human</text></g></svg><script>const prm=window.matchMedia('(prefers-reduced-motion:reduce)').matches;if(!prm){for(let i=0;i<40;i++){const e=document.createElement('div');e.className='ember particle';e.style.left=Math.random()*100+'vw';e.style.top=(300+Math.random()*300)+'px';e.style.animationDelay=Math.random()*4+'s';e.style.animationDuration=(1.5+Math.random()*2)+'s';document.body.appendChild(e)}function flash(c,o,d){const f=document.createElement('div');f.style.cssText='position:fixed;inset:0;background:'+c+';z-index:9999;pointer-events:none;opacity:'+o;document.body.appendChild(f);anime({targets:f,opacity:[o,0],duration:d,easing:'easeOutExpo',complete:()=>f.remove()})}function burst(x,y,c,n){for(let i=0;i<n;i++){const p=document.createElement('div');p.className='ember particle';p.style.left=(x+Math.random()*200-100)+'px';p.style.top=(y+Math.random()*100-50)+'px';p.style.background=c;p.style.boxShadow='0 0 10px '+c;p.style.animationDelay=(i*30)+'ms';document.body.appendChild(p);setTimeout(()=>p.remove(),2500)}}const tl=anime.timeline({loop:true});tl.add({targets:'#bg-ring circle',opacity:[0,0.3,0.6,0.3],duration:800,easing:'easeOutCubic'}).add({targets:'#core',opacity:[0,1],scale:[0.3,1],duration:600,easing:'easeOutElastic(1,0.5)',begin:()=>{burst(400,300,'#ff8c00',20);flash('#ff8c00',0.6,400)}}).add({targets:'#claw-marks path',strokeDashoffset:[200,0],opacity:[0,0.7],delay:anime.stagger(150),duration:500,easing:'easeOutBounce',begin:()=>{burst(300,240,'#ffa500',12)}}).add({targets:'#loop-cycle',opacity:[0,1],translateY:[30,0],duration:500,easing:'easeOutElastic(1,0.4)'}).add({targets:'#node-receive',scale:[{value:1.4},{value:1}],duration:500,easing:'easeOutElastic(1,0.5)',begin:()=>{burst(145,462,'#ff8c00',8);flash('#ff8c00',0.5,300)}},'-=200').add({targets:'#edge-rp',opacity:[0,1],strokeDashoffset:[40,0],duration:300},'-=200').add({targets:'#node-parse',scale:[{value:1.5},{value:1}],duration:500,easing:'easeOutElastic(1,0.5)',begin:()=>{burst(295,462,'#ffa500',8);flash('#ffa500',0.5,300)}},'-=100').add({targets:'#edge-pe',opacity:[0,1],strokeDashoffset:[40,0],duration:300},'-=200').add({targets:'#node-eval',scale:[{value:1.6},{value:1}],rotate:[{value:10},{value:0}],duration:600,easing:'easeOutElastic(1,0.3)',begin:()=>{burst(430,462,'#ff6600',15);flash('#ff6600',0.7,350)}}).add({targets:'#edge-es',opacity:[0,1],strokeDashoffset:[40,0],duration:300},'-=300').add({targets:'#node-sleep',scale:[{value:1.3},{value:1}],opacity:[1,0.4,1],duration:800,easing:'easeInOutSine',begin:()=>{burst(560,462,'#cc6600',6)}},'-=200').add({targets:'#edge-sr',opacity:[0,1],strokeDashoffset:[40,0],duration:300},'-=400').add({targets:'#node-recurse',scale:[{value:2},{value:1}],duration:700,easing:'easeOutElastic(1,0.2)',begin:()=>{burst(700,462,'#ff8c00',20);flash('#ffcc00',0.8,500)}}).add({targets:'#edge-loop',opacity:[0,0.6],strokeDashoffset:[200,0],duration:1200,easing:'easeOutCubic',begin:()=>{burst(400,400,'#ff8c00',10);flash('#ff8c00',0.4,600)}},'-=500').add({targets:'#metta-labels',opacity:[0,1],duration:400,easing:'easeOutCubic',begin:()=>{burst(400,80,'#ff8c00',15);flash('#ff8c00',0.6,400)}}).add({targets:'#title-oma',scale:[{value:2.5},{value:1}],duration:800,easing:'easeOutElastic(1,0.3)',begin:()=>{flash('#ffcc00',0.9,600);burst(400,80,'#ffcc00',25)}},'-=200').add({targets:'#main',opacity:[1,0.1,1,0.1,1,0.2,1],scale:[1,1.05,1],duration:3000,easing:'easeInOutSine',begin:()=>{flash('#fff',0.7,800);for(let i=0;i<5;i++)setTimeout(()=>flash('#ff8c00',0.5,300),i*200)}},'+=500').add({targets:'#claw-marks path',opacity:[0.7,0,0.7],strokeDashoffset:[0,200,0],delay:anime.stagger(100),duration:1200,easing:'easeInOutSine'},'-=2000')}else{document.querySelectorAll('#core,#claw-marks,#loop-cycle,#metta-labels,#bg-ring').forEach(g=>g.setAttribute('opacity','1'));document.querySelectorAll('#edge-rp,#edge-pe,#edge-es,#edge-sr,#edge-loop').forEach(e=>e.setAttribute('opacity','0.6'))}</script></body></html>
