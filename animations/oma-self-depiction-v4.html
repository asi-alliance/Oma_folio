<script>const c=document.getElementById("fractal"),gl=c.getContext("webgl2",{antialias:false});let W=c.width=innerWidth,H=c.height=innerHeight,paused=false,rm=matchMedia("(prefers-reduced-motion:reduce)").matches,t0=performance.now();addEventListener("resize",()=>{W=c.width=innerWidth;H=c.height=innerHeight;gl.viewport(0,0,W,H)});addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();paused=!paused;document.getElementById("pm").textContent=paused?"PAUSED":"[Space] pause/resume"}});const vs=`#version 300 es
