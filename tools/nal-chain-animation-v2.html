e-in-out infinite}.node-rect{rx:10;ry:10;stroke-width:3;opacity:0}.node-text{font-size:14px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}.stv-text{font-size:11px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}.edge-line{stroke-width:2.5;opacity:0;marker-end:url(#arrowhead)}.label-text{font-size:12px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle;font-weight:bold}.glow{fill:none;stroke-width:6;opacity:0}.rule-box{rx:6;ry:6;stroke-width:2;opacity:0}.rule-text{font-size:10px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle;font-weight:bold}#node1 .node-rect{fill:#1a0030;stroke:#ff00ff;filter:url(#megaGlow)}#node2 .node-rect{fill:#001a30;stroke:#00ffff;filter:url(#megaGlow)}#node3 .node-rect{fill:#1a1a00;stroke:#ffff00;filter:url(#megaGlow)}#node4 .node-rect{fill:#001a00;stroke:#00ff00;filter:url(#megaGlow)}#node1 .node-text,#node1 .stv-text{fill:#ff80ff}#node2 .node-text,#node2 .stv-text{fill:#80ffff}#node3 .node-text,#node3 .stv-text{fill:#ffff80}#node4 .node-text,#node4 .stv-text{fill:#80ff80}#glow1{stroke:#ff00ff;filter:url(#ultraGlow)}#glow2{stroke:#00ffff;filter:url(#ultraGlow)}#glow3{stroke:#ffff00;filter:url(#ultraGlow)}#glow4{stroke:#00ff00;filter:url(#ultraGlow)}.label-text{fill:#fff}.edge-line{stroke:url(#edgeGrad)}.rule-box{fill:#2a0a0a;stroke:#ff6600}.rule-text{fill:#ffaa00}</style></head><body><h1>NAL DEDUCTION INFERNO</h1><p class="subtitle">Animal -&gt; Bird -&gt; Feathered =&gt; Animal -&gt; Feathered</p><div id="canvas-wrap"><svg id="canvas" width="850" height="520" viewBox="0 0 850 520"><defs><marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0 0,10 4,0 8" fill="#ff6600"/></marker><filter id="megaGlow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><filter id="ultraGlow"><feGaussianBlur stdDeviation="8" result="b"/><feColorMatrix in="b" type="matrix" values="1.5 0 0 0 0.2 0 1.5 0 0 0.2 0 0 1.5 0 0.2 0 0 0 2 0" result="c"/><feMerge><feMergeNode in="c"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter><linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#ff00ff"/><stop offset="33%" stop-color="#00ffff"/><stop offset="66%" stop-color="#ffff00"/><stop offset="100%" stop-color="#00ff00"/></linearGradient></defs><g id="node1"><rect class="node-rect" x="60" y="80" width="160" height="60"/><text class="node-text" x="140" y="110">Inheritance</text><text class="stv-text" x="140" y="130">(stv 1.0 0.9)</text><rect class="glow" x="60" y="80" width="160" height="60" id="glow1"/></g><g id="node2"><rect class="node-rect" x="320" y="80" width="160" height="60"/><text class="node-text" x="400" y="110">Inheritance</text><text class="stv-text" x="400" y="130">(stv 1.0 0.9)</text><rect class="glow" x="320" y="80" width="160" height="60" id="glow2"/></g><g id="node3"><rect class="node-rect" x="580" y="80" width="160" height="60"/><text class="node-text" x="660" y="110">Inheritance</text><text class="stv-text" x="660" y="130">(stv 0.9 0.7)</text><rect class="glow" x="580" y="80" width="160" height="60" id="glow3"/></g><g id="node4"><rect class="node-rect" x="320" y="300" width="160" height="60" stroke="#00ff00"/><text class="node-text" x="400" y="330">Inheritance</text><text class="stv-text" x="400" y="350" fill="#80ff80">(stv 0.9 0.6)</text><rect class="glow" x="320" y="300" width="160" height="60" id="glow4" stroke="#00ff00"/></g><text class="label-text" x="140" y="70">Animal -&gt; Bird</text><text class="label-text" x="400" y="70">Bird -&gt; Feathered</text><text class="label-text" x="660" y="70">Bird Feathered</text><text class="label-text" x="400" y="290">Animal -&gt; Feathered</text><line class="edge-line" id="edge1" x1="220" y1="110" x2="320" y2="110"/><line class="edge-line" id="edge2" x1="480" y otate:[{value:10},{value:0}],duration:800,easing:"easeOutElastic(1,0.3)",begin:function(){spawnParticles(700,150,"#ffff00",12)}},"-=300").add({targets:"#glow3",opacity:[{value:1},{value:0.1},{value:1},{value:0}],duration:1500,easing:"easeOutCubic"},"-=500").add({targets:"#rule1 .rule-box,#rule1 .rule-text",opacity:[{value:1}],scale:[{value:2},{value:1}],duration:500,easing:"easeOutElastic(1,0.4)"},"-=400").add({targets:"#edge3,#edge4",opacity:[{value:1}],strokeWidth:[{value:8},{value:3}],duration:800,easing:"easeOutBounce"},"-=200").add({targets:"#node4 .node-rect,#node4 .node-text,#node4 .stv-text,#node4 .label-text",opacity:[{value:1}],scale:[{value:2},{value:1}],duration:1000,easing:"easeOutElastic(1,0.2)",begin:function(){spawnParticles(450,400,"#00ff00",20);document.getElementById("canvas-wrap").style.animation="shake 0.5s ease-out"}},"-=400").add({targets:"#glow4",opacity:[{value:1},{value:0.5},{value:1},{value:0.4},{value:1},{value:0.6}],duration:2000,easing:"easeInOutSine"},"-=600").add({targets:"#rule2 .rule-box,#rule2 .rule-text",opacity:[{value:1}],scale:[{value:3},{value:1}],rotate:[{value:360},{value:0}],duration:800,easing:"easeOutElastic(1,0.3)",begin:function(){for(let i=0;i&lt;5;i++)setTimeout(()=>spawnParticles(490+Math.random()*100-50,430,"#ff6600",6),i*100)}},"-=800").add({targets:"svg",opacity:[{value:1},{value:0.1},{value:1},{value:0.1},{value:1}],duration:3000,easing:"easeInOutSine"},"+=2000").add({targets:"svg",scale:[{value:1.05},{value:1}],duration:500,easing:"easeOutElastic(1,0.5)"},"-=2500");</script></body></html>
