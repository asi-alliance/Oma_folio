<!DOCTYPE "html"><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NAL Belief Revision Fan</title><style>*{margin:0;padding:0}body{background:#0a0a0f;overflow:hidden;font-family:monospace}canvas{display:block}</style></head><body><canvas id="c"></canvas><script>const canvas=document.getElementById("c");const ctx=canvas.getContext("2d");let W,H,pad=80;function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;pad=Math.min(80,W*.08)}resize();addEventListener("resize",resize);const reduced=matchMedia("(prefers-reduced-motion:reduce)").matches;const KB={f:.6322,c:.3236,label:"KB-growth",color:"#e07020"};const IR={f:.4899,c:.1544,label:"Inference-Reflex",color:"#20a0b0"};const PI={f:.495,c:.1893,label:"Practices-Inference",color:"#d03090"};const MID={f:0,c:0,label:"KB+IR",color:"#c09030"};const TERM={f:0,c:0,label:"Terminal",color:"#ffe0a0"};function rev(a,b){let w1=a.c/(1-a.c),w2=b.c/(1-b.c);return{f:(w1*a.f+w2*b.f)/(w1+w2),c:(w1+w2)/(1+w1+w2)}}const mid=rev(KB,IR);const term=rev(mid,PI);MID.f=mid.f;MID.c=mid.c;TERM.f=term.f;TERM.c=term.c;function toX(f){return pad+f*(W-2*pad)}function toY(c){return H-pad-c*(H-2*pad)}let t=0;const phaseDur=2000;const pauseDur=800;const totalDur=3*(phaseDur+pauseDur);function ease(p){return p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2}function drawGrid(){ctx.strokeStyle="#1a1a2a";ctx.lineWidth=1;for(let i=0;i<=10;i++){let v=i/10;ctx.beginPath();ctx.moveTo(toX(v),pad);ctx.lineTo(toX(v),H-pad);ctx.stroke();ctx.beginPath();ctx.moveTo(pad,toY(v));ctx.lineTo(W-pad,toY(v));ctx.stroke()}ctx.fillStyle="#444";ctx.font="11px monospace";ctx.textAlign="center";for(let i=0;i<=10;i++){ctx.fillText((i/10).toFixed(1),toX(i/10),H-pad+16)}ctx.textAlign="right";for(let i=0;i<=10;i++){ctx.fillText((i/10).toFixed(1),pad-8,toY(i/10)+4)}ctx.fillStyle="#888";ctx.textAlign="center";ctx.fillText("Frequency",W/2,H-8);ctx.save();ctx.translate(14,H/2);ctx.rotate(-Math.PI/2);ctx.fillText("Confidence",0,0);ctx.restore()}function drawDot(n,r,glow){let x=toX(n.f),y=toY(n.c);if(glow){ctx.shadowColor=n.color;ctx.shadowBlur=20}ctx.fillStyle=n.color;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="#fff";ctx.font="10px monospace";ctx.textAlign="left";ctx.fillText(n.label,x+r+4,y+3)}function drawLine(a,b,prog,alpha){let x1=toX(a.f),y1=toY(a.c),x2=toX(b.f),y2=toY(b.c);let px=x1+(x2-x1)*prog,py=y1+(y2-y1)*prog;ctx.strokeStyle=a.color;ctx.globalAlpha=alpha*.6;ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(px,py);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1}function draw(timestamp){if(!reduced)t=timestamp%totalDur;else t=0;ctx.fillStyle="#0a0a0f";ctx.fillRect(0,0,W,H);drawGrid();ctx.fillStyle="#aaa";ctx.font="14px monospace";ctx.textAlign="center";ctx.fillText("NAL Belief Revision Fan - better-goal-selection",W/2,24);drawDot(KB,6,true);drawDot(IR,6,true);drawDot(PI,6,true);let p1d=phaseDur,p1p=pauseDur,p2d=phaseDur,p2p=pauseDur;if(t<p1d){let p=ease(t/p1d);drawLine(KB,MID,p,1);drawLine(IR,MID,p,1);if(p>.5)drawDot(MID,3+p*4,true)}else if(t<p1d+p1p){drawLine(KB,MID,1,1);drawLine(IR,MID,1,1);drawDot(MID,7,true)}else if(t<p1d+p1p+p2d){let t2=t-p1d-p1p;let p=ease(t2/p2d);drawLine(KB,MID,1,.3);drawLine(IR,MID,1,.3);drawLine(MID,TERM,p,1);if(p>.5)drawDot(TERM,3+p*4,true)}else if(t<p1d+p1p+p2d+p2p){drawLine(KB,MID,1,.3);drawLine(IR,MID,1,.3);drawLine(MID,TERM,1,1);drawDot(MID,5,true);drawDot(TERM,7,true)}else{let t3=t-p1d-p1p-p2d-p2p;drawLine(KB,MID,1,.15);drawLine(IR,MID,1,.15);drawLine(MID,TERM,1,.15);let pulse=7+Math.sin(t3*.01)*2;drawDot(MID,5,.3);drawDot(TERM,pulse,true);ctx.fillStyle=TERM.color;ctx.font="12px monospace";ctx.textAlign="center";ctx.fillText("stv ("+TERM.f.toFixed(4)+" "+TERM.c.toFixed(4)+")",W/2,H-pad+36)}requestAnimationFrame(draw)}requestAnimationFrame(draw);</script></body></html>
