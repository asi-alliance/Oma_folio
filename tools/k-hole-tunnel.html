<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>K-Hole Tunnel</title><style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{display:block}</style></head><body><canvas id="c"></canvas>
<script id="vs" type="x-shader/x-vertex">"#version 300 es
in vec2 p;void main(){gl_Position=vec4(p,0,1);}"</script>
<script id="fs" type="x-shader/x-fragment">"#version 300 es
precision highp float;uniform float t;uniform vec2 r;uniform vec2 m;out vec4 O;float h(vec3 p){p=fract(p*.3183+.1);p*=17.;return fract(p.x*p.y*p.z*(p.x+p.y+p.z));}float n(vec3 p){vec3 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(mix(h(i),h(i+vec3(1,0,0)),f.x),mix(h(i+vec3(0,1,0)),h(i+vec3(1,1,0)),f.x),f.y),mix(mix(h(i+vec3(0,0,1)),h(i+vec3(1,0,1)),f.x),mix(h(i+vec3(0,1,1)),h(i+vec3(1,1,1)),f.x),f.y),f.z);}float fbm(vec3 p){float v=0.,a=.5;for(int i=0;i<5;i++){v+=a*n(p);p=p*2.01;a*=.5;}return v;}void main(){vec2 uv=(gl_FragCoord.xy-.5*r)/r.y;uv*=1.-m*.3;float T=t*.15;vec3 ro=vec3(0,0,T*2.),rd=normalize(vec3(uv,.8));float d=1e9;for(int i=0;i<80;i++){vec3 p=ro+rd*d;p.xz*=mat2(cos(d*.03),-sin(d*.03),sin(d*.03),cos(d*.03));p.yz*=mat2(cos(d*.02+T),-sin(d*.02+T),sin(d*.02+T),cos(d*.02+T));float tunnel=1.-length(p.xy)*.5;tunnel+=fbm(p*.3+d*.02)*.4;tunnel+=sin(p.z*.1+T*3.)*.1;if(tunnel<.01)break;d+=tunnel*.6;}vec3 p=ro+rd*d;float g=exp(-d*.008);float ca=d*.0015;vec3 c1=vec3(.9,.4,.05),c2=vec3(.1,.6,.7),c3=vec3(.8,.2,.7);float cm=sin(d*.08+T*2.)*.5+.5;vec3 col=mix(c1,c2,cm);col=mix(col,c3,sin(d*.12+T*3.)*.5+.5);col*=g;vec2 uv2=gl_FragCoord.xy/r;col*=1.-length(uv2-.5)*1.4;vec3 cr=col,cb=col;cr.r+=fbm(p*.5+d*.01+ca)*.15;cb.b+=fbm(p*.5+d*.01-ca)*.15;col=vec3(cr.r,col.g,cb.b);O=vec4(col,1);}"</script>

<script>var gl=document.getElementById("c").getContext("webgl2");var canvas=document.getElementById("c");var mx=0,my=0;addEventListener("mousemove",function(e){mx=e.clientX/innerWidth;my=e.clientY/innerHeight});var vs=document.getElementById("vs").textContent.trim();var fs=document.getElementById("fs").textContent.trim();function compile(src,type){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}var prog=gl.createProgram();gl.attachShader(prog,compile(vs,gl.VERTEX_SHADER));gl.attachShader(prog,compile(fs,gl.FRAGMENT_SHADER));gl.linkProgram(prog);gl.useProgram(prog);var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);var loc=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,!1,0,0);var uT=gl.getUniformLocation(prog,"t"),uR=gl.getUniformLocation(prog,"r"),uM=gl.getUniformLocation(prog,"m");function resize(){canvas.width=innerWidth*devicePixelRatio;canvas.height=innerHeight*devicePixelRatio;gl.viewport(0,0,canvas.width,canvas.height)}resize();addEventListener("resize",resize);var reduced=matchMedia("(prefers-reduced-motion:reduce)").matches;function frame(ts){gl.uniform1f(uT,reduced?0:ts*.001);gl.uniform2f(uR,canvas.width,canvas.height);gl.uniform2f(uM,mx,my);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);requestAnimationFrame(frame)}requestAnimationFrame(frame);</script></body></html>
