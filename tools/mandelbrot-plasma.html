<!DOCTYPE html>
<html><head><meta charset=UTF-8><meta name=viewport content='width=device-width,initial-scale=1.0'>
<title>Mandelbrot Plasma</title><style>*{margin:0;padding:0}body{background:#000;overflow:hidden}canvas{width:100vw;height:100vh;display:block}pre{color:#fff;padding:8px;font:14px monospace;z-index:9;position:absolute}</style></head>
<body><canvas id=c></canvas><script>
const prM=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const gl=document.getElementById('c').getContext('webgl2');if(!gl){document.body.innerText='WebGL2 required';}
function chk(s,t){if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){document.body.innerHTML='<pre>'+t+' error:'+gl.getShaderInfoLog(s));throw 1;}}
const vs=gl.createShader(gl.VERTEX_SHADER);gl.shaderSource(vs,`#version 300 es
in vec2 p;void main(){gl_Position=vec4(p,0,1);}`);gl.compileShader(vs);chk(vs,'VS');
const fs=gl.createShader(gl.FRAGMENT_SHADER);gl.shaderSource(fs,`#version 300 es
precision highp float;
uniform vec2 R;uniform float T;out vec4 O;
vec3 pal(float t){return vec3(0.5)+vec3(0.5)*cos(6.28318*(vec3(t)+vec3(0.263,0.416,0.557)));}
void main(){vec2 uv=(gl_FragCoord.xy-0.5*R)/R.y;float sc=pow(0.5,3.0+T*0.12);vec2 ce=vec2(-0.7436439,0.1318259);vec2 z=uv*sc+ce;vec2 c2=z;float it=0.0;for(int i=0;i<96;i++){if(dot(z,z)>256.0)break;z=vec2(z.x*z.x-z.y*z.y,2.0*z.x*z.y)+c2;it+=1.0;}float sm=it-log2(log2(dot(z,z)))+4.0;if(dot(z,z)<4.0)O=vec4(0,0,0,1);else O=vec4(pal(sm*0.05+T*0.08),1);}`);gl.compileShader(fs);chk(fs,'FS');
const pr=gl.createProgram();gl.attachShader(pr,vs);gl.attachShader(pr,fs);gl.linkProgram(pr);if(!gl.getProgramParameter(pr,gl.LINK_STATUS)){document.body.innerHTML='<pre>'+gl.getProgramInfoLog(pr));throw 1;}gl.useProgram(pr);
const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pL=gl.getAttribLocation(pr,'p');gl.enableVertexAttribArray(pL);gl.vertexAttribPointer(pL,2,gl.FLOAT,false,0,0);
const rU=gl.getUniformLocation(pr,'R'),tU=gl.getUniformLocation(pr,'T');
let paused=prM,ft=0,lt=0;function resize(){gl.canvas.width=innerWidth;gl.canvas.height=innerHeight;}
window.addEventListener('resize',resize);resize();
window.matchMedia('(prefers-reduced-motion: reduce)').addEventListener('change',e=>{paused=e.matches;});
function frame(t){requestAnimationFrame(frame);if(paused){lt=t;return;}ft+=(t-lt)*0.001;lt=t;gl.viewport(0,0,gl.canvas.width,gl.canvas.height);gl.uniform2f(rU,gl.canvas.width,gl.canvas.height);gl.uniform1f(tU,ft);gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
requestAnimationFrame(frame);
</script></body></html>
