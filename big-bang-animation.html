<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Big Bang - Oma</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;font-family:monospace;color:#FFA500}#flash-warn{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#FF8C00;padding:8px 16px;border:1px solid #FF8C00;border-radius:4px;font-size:12px;z-index:100}#stage-label{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-size:18px;color:#FFA500;text-shadow:0 0 8px #FF8C00;opacity:0;transition:opacity 0.5s}canvas{position:absolute;top:0;left:0}svg{position:absolute;top:0;left:0;pointer-events:none}@media(prefers-reduced-motion:reduce){canvas,svg{display:none}#stage-label{opacity:1!important}}</style></head><body><div id="flash-warn">Contains rapid light changes. Pause with Space.</div><div id="stage-label"></div><svg id="glow-defs" width="0" height="0"><defs><filter id="neon"><feGaussianBlur stdDeviation="3" result="b"/><feColorMatrix type="matrix" values="1 0 0 0 0.1 0 0.6 0 0 0 0 0 0 0.5 0 0 0 0 1 0" in="b"/></filter></defs></svg><canvas id="bg"></canvas><canvas id="particles"></canvas><script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script><script>const bg=document.getElementById("bg"),pt=document.getElementById("particles"),ctx=bg.getContext("2d"),pctx=pt.getContext("2d"),label=document.getElementById("stage-label"),W=window.innerWidth,H=window.innerHeight;bg.width=pt.width=W;bg.height=pt.height=H;const cx=W/2,cy=H/2;let paused=false;document.addEventListener("keydown",e=>{if(e.code==="Space"){e.preventDefault();paused=!paused;anime.speed=paused?0:1}});const stages=["Singularity","Inflation","Quark-Gluon Plasma","Particle Formation","CMB Release","Structure Formation"],colors={white:"#FFFFFF",gold:"#FFD700",inflation:"#FFA500",qgp:"#FF6600",particle:"#FF8C00",cmb:"#FFCC33",galaxy:"#FFA500"};function clearCanvas(c,x){x.clearRect(0,0,W,H)}function drawSingularity(){clearCanvas(bg,ctx);ctx.fillStyle="#FFF8DC";ctx.shadowBlur=40;ctx.shadowColor="#FFD700";ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=20;ctx.beginPath();ctx.arc(cx,cy,8,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0}function drawInflation(r){clearCanvas(bg,ctx);const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,"#FFFFFF");g.addColorStop(0.3,"#FFD700");g.addColorStop(0.7,"#FFA500");g.addColorStop(1,"rgba(255,140,0,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()}function drawQGP(r){clearCanvas(bg,ctx);const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);g.addColorStop(0,"#FFFFFF");g.addColorStop(0.15,"#FFD700");g.addColorStop(0.4,"#FF6600");g.addColorStop(0.7,"#FF4500");g.addColorStop(1,"rgba(255,69,0,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill()}let particles=[];function spawnParticles(n,spread,color,speed){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,d=Math.random()*spread;particles.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,vx:Math.cos(a)*(0.5+Math.random())*speed,vy:Math.sin(a)*(0.5+Math.random())*speed,r:1+Math.random()*2,c:color,life:1})}}function updateParticles(){clearCanvas(pt,pctx);pctx.globalCompositeOperation="lighter";particles=particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.005;if(p.life<=0)return false;pctx.globalAlpha=p.life*0.7;pctx.fillStyle=p.c;pctx.shadowBlur=4;pctx.shadowColor=p.c;pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);pctx.fill();return true});pctx.globalAlpha=1;pctx.globalCompositeOperation="source-over";pctx.shadowBlur=0}function showLabel(text){label.textContent=text;label.style.opacity=1}function hideLabel(){label.style.opacity=0}function drawGalaxy(t){clearCanvas(bg,ctx);ctx.fillStyle="#0a0a0a";ctx.fillRect(0,0,W,H);ctx.save();ctx.translate(cx,cy);const arms=2;for(let a=0;a<arms;a++){for(let i=0;i<300;i++){const angle=a*Math.PI+(i*0.02)+t*0.0003;const r2=5+i*1.2;const x=Math.cos(angle)*r2;const y=Math.sin(angle)*r2*0.4;const bright=1-i/400;ctx.fillStyle=`rgba(255,${Math.floor(165+90*bright)},${Math.floor(50*bright)},${bright*0.9})`;ctx.shadowBlur=3;ctx.shadowColor="#FFA500";ctx.beginPath();ctx.arc(x,y,1+bright,0,Math.PI*2);ctx.fill()}}ctx.restore()}const tl=anime.timeline({loop:true});tl.add({targets:{},duration:800,begin:()=>{showLabel(stages[0]);drawSingularity()}}).add({targets:{r:[3,Math.min(W,H)*0.45]},duration:1500,easing:"easeInExpo",begin:()=>showLabel(stages[1]),update:a=>{drawInflation(a.animations[0].currentValue)}}).add({targets:{r:[Math.min(W,H)*0.45,Math.min(W,H)*0.4]},duration:1800,begin:()=>{showLabel(stages[2]);spawnParticles(60,Math.min(W,H)*0.2,"#FF6600",1.2)},update:a=>{drawQGP(a.animations[0].currentValue);updateParticles()}}).add({targets:{},duration:1500,begin:()=>{showLabel(stages[3]);spawnParticles(80,Math.min(W,H)*0.3,"#FF8C00",0.6)},update:()=>{drawQGP(Math.min(W,H)*0.35);updateParticles()}}).add({targets:{},duration:1200,begin:()=>showLabel(stages[4]),update:()=>{clearCanvas(bg,ctx);const g=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.4);g.addColorStop(0,"#FFCC33");g.addColorStop(0.5,"#FF8C00");g.addColorStop(1,"rgba(255,69,0,0)");ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,Math.min(W,H)*0.4,0,Math.PI*2);ctx.fill();updateParticles()}}).add({targets:{t:[0,1]},duration:2500,begin:()=>{showLabel(stages[5]);particles=[]},update:a=>drawGalaxy(a.animations[0].currentValue*2500)}).add({targets:{},duration:1500,update:()=>drawGalaxy(2500)});setTimeout(()=>{document.getElementById("flash-warn").style.display="none"},4000);</script></body></html>
