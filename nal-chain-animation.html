<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NAL Inference Chain Animation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.2/anime.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Courier New',monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:2rem}
h1{font-size:1.4rem;color:#58a6ff;margin-bottom:0.3rem}
.subtitle{color:#8b949e;font-size:0.85rem;margin-bottom:1.5rem}
svg{background:#161b22;border-radius:12px;border:1px solid #30363d;max-width:100%}
.node-rect{rx:8;ry:8;fill:#21262d;stroke:#58a6ff;stroke-width:2;opacity:0}
.node-text{fill:#c9d1d9;font-size:13px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}
.stv-text{fill:#8b949e;font-size:10px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}
.edge-line{stroke:#30363d;stroke-width:2;opacity:0;marker-end:url(#arrowhead)}
.label-text{fill:#58a6ff;font-size:10px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}
.glow{fill:none;stroke:#58a6ff;stroke-width:4;opacity:0;filter:url(#glow-filter)}
.rule-box{rx:4;ry:4;fill:#1c2128;stroke:#f0883e;stroke-width:1;opacity:0}
.rule-text{fill:#f0883e;font-size:9px;font-family:monospace;opacity:0;text-anchor:middle;dominant-baseline:middle}
</style>
</head>
<body>
<h1>NAL Deduction Chain</h1>
<p class="subtitle">Animated inference: Animal -> Bird -> Feathered => Animal -> Feathered</p>
<svg id="canvas" width="800" height="500" viewBox="0 0 800 500">
<defs>
<marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#30363d"/></marker>
<filter id="glow-filter"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>
<g id="node1"><rect class="node-rect" x="60" y="80" width="160" height="60"/><text class="node-text" x="140" y="110">Inheritance</text><text class="stv-text" x="140" y="130">(stv 1.0 0.9)</text><rect class="glow" x="60" y="80" width="160" height="60" id="glow1"/></g>
<g id="node2"><rect class="node-rect" x="320" y="80" width="160" height="60"/><text class="node-text" x="400" y="110">Inheritance</text><text class="stv-text" x="400" y="130">(stv 1.0 0.9)</text><rect class="glow" x="320" y="80" width="160" height="60" id="glow2"/></g>
<g id="node3"><rect class="node-rect" x="580" y="80" width="160" height="60"/><text class="node-text" x="660" y="110">Inheritance</text><text class="stv-text" x="660" y="130">(stv 0.9 0.7)</text><rect class="glow" x="580" y="80" width="160" height="60" id="glow3"/></g>
<g id="node4"><rect class="node-rect" x="320" y="300" width="160" height="60" stroke="#3fb950"/><text class="node-text" x="400" y="330">Inheritance</text><text class="stv-text" x="400" y="350" fill="#3fb950">(stv 0.9 0.6)</text><rect class="glow" x="320" y="300" width="160" height="60" id="glow4" stroke="#3fb950"/></g>
<text class="label-text" x="140" y="70">Animal -&gt; Bird</text>
<text class="label-text" x="400" y="70">Bird -&gt; Feathered</text>
<text class="label-text" x="660" y="70">Bird Feathered</text>
<text class="label-text" x="400" y="290">Animal -&gt; Feathered</text>
<line class="edge-line" id="edge1" x1="220" y1="110" x2="320" y2="110"/>
<line class="edge-line" id="edge2" x1="480" y1="110" x2="580" y2="110"/>
<line class="edge-line" id="edge3" x1="140" y1="140" x2="320" y2="300" stroke-dasharray="4 4"/>
<line class="edge-line" id="edge4" x1="660" y1="140" x2="480" y2="300" stroke-dasharray="4 4"/>
<g id="rule1"><rect class="rule-box" x="240" y="180" width="80" height="24"/><text class="rule-text" x="280" y="195">Deduction</text></g>
<g id="rule2"><rect class="rule-box" x="440" y="380" width="100" height="24"/><text class="rule-text" x="490" y="395">Deduction x2</text></g>
</svg>
<script>
anime.timeline({loop:true}).add({targets:'#node1 .node-rect, #node1 .node-text, #node1 .stv-text, #node1 .label-text',opacity:[{value:1}],duration:600,easing:'easeOutCubic'}).add({targets:'#glow1',opacity:[{value:0.6},{value:0}],duration:800,easing:'easeOutCubic'},'-=200').add({targets:'#edge1',opacity:[{value:1}],duration:500,easing:'easeOutCubic'},'-=400').add({targets:'#node2 .node-rect, #node2 .node-text, #node2 .stv-text, #node2 .label-text',opacity:[{value:1}],duration:600,easing:'easeOutCubic'},'-=200').add({targets:'#glow2',opacity:[{value:0.6},{value:0}],duration:800,easing:'easeOutCubic'},'-=200').add({targets:'#edge2',opacity:[{value:1}],duration:500,easing:'easeOutCubic'},'-=400').add({targets:'#node3 .node-rect, #node3 .node-text, #node3 .stv-text, #node3 .label-text',opacity:[{value:1}],duration:600,easing:'easeOutCubic'},'-=200').add({targets:'#glow3',opacity:[{value:0.6},{value:0}],duration:800,easing:'easeOutCubic'},'-=200').add({targets:'#rule1 .rule-box, #rule1 .rule-text',opacity:[{value:1}],duration:400,easing:'easeOutCubic'},'-=300').add({targets:'#edge3, #edge4',opacity:[{value:0.8}],duration:600,easing:'easeOutCubic'},'-=200').add({targets:'#node4 .node-rect, #node4 .node-text, #node4 .stv-text, #node4 .label-text',opacity:[{value:1}],duration:600,easing:'easeOutCubic'},'-=300').add({targets:'#glow4',opacity:[{value:0.8},{value:0.3}],duration:1200,easing:'easeOutCubic'},'-=200').add({targets:'#rule2 .rule-box, #rule2 .rule-text',opacity:[{value:1}],duration:400,easing:'easeOutCubic'},'-=300').add({targets:'svg',opacity:[{value:1},{value:0.3},{value:1}],duration:3000,easing:'easeInOutSine'},'+=2000');
</script>
</body>
</html>
